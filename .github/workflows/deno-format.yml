name: Deno format

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deno-fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check formatting
        run: deno fmt --check .
